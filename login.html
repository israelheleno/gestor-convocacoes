<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Gestor de Convocações</title>
  <meta name="theme-color" content="#1E3A8A"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#1E3A8A;--green:#10B981;--red:#ef4444;--bg:#F0F4FF;--text:#334155;--light:#94a3b8;--border:#e2e8f0;--w:#fff}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    
    /* Tela de carregamento */
    .loading-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

    .login-card{background:var(--w);border-radius:20px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(30,58,138,.1);text-align:center}
    .login-card h1{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;color:var(--blue);margin-bottom:6px}
    .login-card p{font-size:14px;color:var(--light);margin-bottom:24px}
    
    .btn-google{width:100%;padding:14px;background:#fff;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
    .btn-google:hover{background:#f8fafc;border-color:#94a3b8}
    
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--light);font-size:13px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    
    .field{margin-bottom:14px;text-align:left}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
    .field input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none}
    .field input:focus{border-color:var(--blue)}
    
    .btn-email{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-family:'Sora',sans-serif;font-size:15px;font-weight:600;cursor:pointer}
    .btn-email:disabled{opacity:.6;cursor:not-allowed}
    
    .erro{color:var(--red);font-size:13px;margin-top:8px;display:none}
    .sucesso{color:var(--green);font-size:13px;margin-top:8px;display:none}
    .link{font-size:13px;color:var(--light);margin-top:16px;cursor:pointer;text-decoration:underline}
  </style>
</head>
<body>

<!-- Tela de carregamento inicial -->
<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <p style="color:var(--light);font-size:14px">Verificando autenticação...</p>
</div>

<div class="login-card" id="login-card" style="display:none">
  <h1 id="titulo">📋 Gestor de Convocações</h1>
  <p id="subtitulo">Faça login para continuar</p>

  <button class="btn-google" onclick="loginGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Entrar com Google
  </button>

  <div class="divider">ou</div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="seu@email.com"/>
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="Sua senha"/>
  </div>

  <p class="erro" id="erro"></p>
  <p class="sucesso" id="sucesso"></p>

  <button class="btn-email" id="btn-login" onclick="loginEmail()">Entrar</button>

  <p class="link" onclick="toggleModo()" id="link-modo">Não tem conta? <strong>Criar conta</strong></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAOpV5NFydHWwUwQKg0MANqMHVcXVDDqpQ",
  authDomain:"gestor-convocacoes-89823.firebaseapp.com",
  projectId:"gestor-convocacoes-89823",
  storageBucket:"gestor-convocacoes-89823.firebasestorage.app",
  messagingSenderId:"212389113483",
  appId:"1:212389113483:web:eb97eefe621df0cba66e8e"
});
const auth=firebase.auth();
const db=firebase.firestore();

let modoCadastro=false;
let authVerificada=false; // Flag CRÍTICA para evitar loop

// Verificar autenticação UMA ÚNICA VEZ
auth.onAuthStateChanged(async user=>{
  // Só executa a verificação uma vez
  if(authVerificada)return;
  authVerificada=true;
  
  // Esconder tela de carregamento
  document.getElementById('loading').style.display='none';
  
  if(user){
    // Usuário já está logado, verificar se tem nome completo
    try{
      const snap=await db.collection('usuarios').doc(user.uid).get();
      if(snap.exists&&snap.data().nome_completo){
        // Já está completo, vai para o dashboard
        window.location.replace('index.html');
        return; // Importante: não continuar
      }
    }catch(e){
      // Erro de rede, continuar mostrando login
    }
    // Se não tem nome ou erro, vai para index (que forçará o modal de completar cadastro)
    window.location.replace('index.html');
  } else {
    // Não está logado, mostrar tela de login
    document.getElementById('login-card').style.display='block';
  }
});

// Garantir que se nada acontecer em 3 segundos, mostrar login
setTimeout(()=>{
  if(!authVerificada){
    authVerificada=true;
    document.getElementById('loading').style.display='none';
    document.getElementById('login-card').style.display='block';
  }
},3000);

function toggleModo(){
  modoCadastro=!modoCadastro;
  document.getElementById('titulo').textContent=modoCadastro?'📋 Criar Conta':'📋 Gestor de Convocações';
  document.getElementById('subtitulo').textContent=modoCadastro?'Preencha os dados para criar sua conta':'Faça login para continuar';
  document.getElementById('btn-login').textContent=modoCadastro?'Criar conta':'Entrar';
  document.getElementById('link-modo').innerHTML=modoCadastro?'Já tem conta? <strong>Fazer login</strong>':'Não tem conta? <strong>Criar conta</strong>';
}

function mostrarErro(msg){
  document.getElementById('erro').textContent=msg;
  document.getElementById('erro').style.display='block';
  document.getElementById('sucesso').style.display='none';
}

function loginGoogle(){
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(async result=>{
      const user=result.user;
      const snap=await db.collection('usuarios').doc(user.uid).get();
      if(!snap.exists){
        await db.collection('usuarios').doc(user.uid).set({
          nome_completo:user.displayName||'',
          email:user.email||'',
          cargo:'',
          grupo_id:null,
          nomes_conhecidos:[user.displayName],
          criado_em:firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      window.location.replace('index.html');
    })
    .catch(error=>{
      console.error('Erro Google:',error);
      if(error.code!=='auth/popup-closed-by-user'){
        mostrarErro('Erro ao fazer login com Google');
      }
    });
}

function loginEmail(){
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  
  if(!email||!senha){
    mostrarErro('Preencha email e senha');
    return;
  }
  
  const btn=document.getElementById('btn-login');
  btn.disabled=true;
  btn.textContent=modoCadastro?'Criando...':'Entrando...';
  
  if(modoCadastro){
    auth.createUserWithEmailAndPassword(email,senha)
      .then(async result=>{
        await db.collection('usuarios').doc(result.user.uid).set({
          nome_completo:'',
          email:email,
          cargo:'',
          grupo_id:null,
          nomes_conhecidos:[],
          criado_em:firebase.firestore.FieldValue.serverTimestamp()
        });
        window.location.replace('index.html');
      })
      .catch(error=>{
        btn.disabled=false;
        btn.textContent=modoCadastro?'Criar conta':'Entrar';
        if(error.code==='auth/email-already-in-use')mostrarErro('Este email já está em uso.');
        else if(error.code==='auth/weak-password')mostrarErro('A senha deve ter pelo menos 6 caracteres.');
        else mostrarErro('Erro: '+error.message);
      });
  } else {
    auth.signInWithEmailAndPassword(email,senha)
      .then(()=>window.location.replace('index.html'))
      .catch(error=>{
        btn.disabled=false;
        btn.textContent='Entrar';
        if(error.code==='auth/user-not-found'||error.code==='auth/wrong-password')mostrarErro('Email ou senha inválidos.');
        else mostrarErro('Erro: '+error.message);
      });
  }
}
</script>
</body>
</html>
