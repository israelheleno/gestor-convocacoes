<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestor de Convocações — Entrar</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1E3A8A;
      --blue-light: #2d4fad;
      --blue-dark: #152a6e;
      --green: #10B981;
      --gray-bg: #F0F4FF;
      --gray-text: #334155;
      --gray-light: #94a3b8;
      --white: #ffffff;
      --danger: #ef4444;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gray-bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }

    /* Background decorativo */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(30,58,138,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -15%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(16,185,129,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--white);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(30,58,138,0.10);
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: var(--blue);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 26px; height: 26px; fill: white; }

    .logo-text h1 {
      font-family: 'Sora', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--blue);
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 12px;
      color: var(--gray-light);
      font-weight: 400;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--gray-bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-light);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--white);
      color: var(--blue);
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(30,58,138,0.10);
    }

    /* Forms */
    .form-panel { display: none; }
    .form-panel.active { display: block; animation: fadeUp 0.3s ease both; }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-text);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--gray-text);
      outline: none;
      transition: border-color 0.2s;
      background: var(--white);
    }

    .field input:focus { border-color: var(--blue); }
    .field input::placeholder { color: #cbd5e1; }

    /* Onboarding extra fields */
    .onboarding-fields {
      display: none;
      border-top: 1.5px dashed #e2e8f0;
      margin-top: 8px;
      padding-top: 16px;
    }
    .onboarding-fields.show { display: block; animation: fadeUp 0.3s ease both; }
    .onboarding-label {
      font-size: 12px;
      color: var(--gray-light);
      margin-bottom: 12px;
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-primary:hover { background: var(--blue-light); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--gray-light);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .btn-google {
      width: 100%;
      padding: 13px;
      background: white;
      color: var(--gray-text);
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .btn-google:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(30,58,138,0.08); }

    /* Mensagem de erro/sucesso */
    .msg {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.error { background: #fee2e2; color: #b91c1c; display: block; }
    .msg.success { background: #d1fae5; color: #065f46; display: block; }

    /* Loading spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--gray-light);
      margin-top: 24px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M17 3H7C5.9 3 5 3.9 5 5v16l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"/></svg>
    </div>
    <div class="logo-text">
      <h1>Gestor de Convocações</h1>
      <p>Câmara Municipal · TV Câmara</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
    <button class="tab-btn" onclick="switchTab('cadastro')">Criar conta</button>
  </div>

  <div id="msg" class="msg"></div>

  <!-- LOGIN -->
  <div id="panel-login" class="form-panel active">
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com"/>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••••"/>
    </div>
    <button class="btn-primary" id="btn-login" onclick="fazerLogin()">
      <span id="login-txt">Entrar</span>
      <div class="spinner" id="login-spinner"></div>
    </button>
    <div class="divider">ou</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continuar com Google
    </button>
  </div>

  <!-- CADASTRO -->
  <div id="panel-cadastro" class="form-panel">
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="cad-email" placeholder="seu@email.com"/>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres"/>
    </div>

    <div class="onboarding-fields show">
      <p class="onboarding-label">📋 Complete seu perfil (necessário uma única vez)</p>
      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="cad-nome" placeholder="Como aparece nos documentos"/>
      </div>
      <div class="field">
        <label>Cargo</label>
        <input type="text" id="cad-cargo" placeholder="Ex: Operador de Câmera"/>
      </div>
    </div>

    <button class="btn-primary" id="btn-cadastro" onclick="fazerCadastro()">
      <span id="cad-txt">Criar conta</span>
      <div class="spinner" id="cad-spinner"></div>
    </button>
    <div class="divider">ou</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continuar com Google
    </button>
  </div>
</div>

<p class="footer-note">
  Ao entrar, você concorda com o uso interno<br/>dos seus dados para gestão de convocações.
</p>

<script type="module">
  import { auth, db, googleProvider } from './js/firebase-config.js';
  import {
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signInWithPopup,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    doc, setDoc, getDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Expor funções ao escopo global
  window.switchTab = switchTab;
  window.fazerLogin = fazerLogin;
  window.fazerCadastro = fazerCadastro;
  window.loginGoogle = loginGoogle;

  // Redirecionar se já logado
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const snap = await getDoc(doc(db, 'usuarios', user.uid));
      if (snap.exists() && snap.data().nome_completo) {
        window.location.href = 'index.html';
      }
    }
  });

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='cadastro'));
    });
    document.getElementById('panel-login').classList.toggle('active', tab==='login');
    document.getElementById('panel-cadastro').classList.toggle('active', tab==='cadastro');
    limparMsg();
  }

  function showMsg(txt, tipo='error') {
    const el = document.getElementById('msg');
    el.textContent = txt;
    el.className = 'msg ' + tipo;
  }

  function limparMsg() {
    const el = document.getElementById('msg');
    el.className = 'msg';
    el.textContent = '';
  }

  function setLoading(btn, spinner, txt, loading) {
    document.getElementById(btn).disabled = loading;
    document.getElementById(spinner).style.display = loading ? 'block' : 'none';
    document.getElementById(txt).style.display = loading ? 'none' : 'block';
  }

  async function salvarPerfil(uid, nome, cargo, email) {
    await setDoc(doc(db, 'usuarios', uid), {
      uid,
      nome_completo: nome,
      nomes_conhecidos: [nome],
      cargo,
      email,
      grupo_id: null,
      fcm_token: null,
      criado_em: serverTimestamp()
    }, { merge: true });
  }

  async function fazerLogin() {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    if (!email || !senha) return showMsg('Preencha e-mail e senha.');
    setLoading('btn-login','login-spinner','login-txt', true);
    try {
      await signInWithEmailAndPassword(auth, email, senha);
      window.location.href = 'index.html';
    } catch(e) {
      showMsg(traduzirErro(e.code));
      setLoading('btn-login','login-spinner','login-txt', false);
    }
  }

  async function fazerCadastro() {
    const email = document.getElementById('cad-email').value.trim();
    const senha = document.getElementById('cad-senha').value;
    const nome = document.getElementById('cad-nome').value.trim();
    const cargo = document.getElementById('cad-cargo').value.trim();
    if (!email || !senha || !nome || !cargo)
      return showMsg('Preencha todos os campos.');
    if (senha.length < 6)
      return showMsg('A senha precisa ter pelo menos 6 caracteres.');
    setLoading('btn-cadastro','cad-spinner','cad-txt', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, senha);
      await salvarPerfil(cred.user.uid, nome, cargo, email);
      window.location.href = 'index.html';
    } catch(e) {
      showMsg(traduzirErro(e.code));
      setLoading('btn-cadastro','cad-spinner','cad-txt', false);
    }
  }

  async function loginGoogle() {
    try {
      const result = await signInWithPopup(auth, googleProvider);
      const user = result.user;
      const snap = await getDoc(doc(db, 'usuarios', user.uid));
      if (!snap.exists() || !snap.data().nome_completo) {
        // Pedir cargo via prompt simples (tela de onboarding será melhorada)
        const cargo = prompt('Bem-vindo(a)! Qual é o seu cargo?');
        if (!cargo) { auth.signOut(); return; }
        await salvarPerfil(user.uid, user.displayName || '', cargo, user.email);
      }
      window.location.href = 'index.html';
    } catch(e) {
      showMsg(traduzirErro(e.code));
    }
  }

  function traduzirErro(code) {
    const erros = {
      'auth/user-not-found': 'Usuário não encontrado.',
      'auth/wrong-password': 'Senha incorreta.',
      'auth/email-already-in-use': 'Este e-mail já está cadastrado.',
      'auth/invalid-email': 'E-mail inválido.',
      'auth/weak-password': 'Senha muito fraca.',
      'auth/popup-closed-by-user': 'Login cancelado.',
      'auth/network-request-failed': 'Sem conexão com a internet.',
    };
    return erros[code] || 'Erro inesperado. Tente novamente.';
  }
</script>
</body>
</html>
