<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A"/>
      <stop offset="100%" style="stop-color:#152a6e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- Documento principal -->
  <rect x="130" y="80" width="252" height="320" rx="18" fill="white" filter="url(#shadow)"/>

  <!-- Dobra superior direita do documento -->
  <path d="M330 80 L382 132 L330 132 Z" fill="#e2e8f0"/>
  <path d="M330 80 L382 132 L330 132 Z" fill="#cbd5e1" opacity="0.5"/>

  <!-- Linhas do documento (texto simulado) -->
  <rect x="158" y="170" width="140" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="158" y="195" width="196" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="158" y="220" width="170" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="158" y="245" width="196" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="158" y="270" width="120" height="10" rx="5" fill="#e2e8f0"/>

  <!-- Cabeçalho dourado do documento -->
  <rect x="130" y="80" width="200" height="68" rx="18" fill="url(#goldGrad)"/>
  <rect x="230" y="80" width="100" height="68" fill="url(#goldGrad)"/>
  <rect x="130" y="118" width="200" height="30" fill="url(#goldGrad)"/>

  <!-- TV / câmera icon no cabeçalho -->
  <rect x="168" y="98" width="44" height="32" rx="5" fill="white" opacity="0.9"/>
  <circle cx="230" cy="108" r="8" fill="white" opacity="0.7"/>
  <path d="M242 104 L258 96 L258 120 L242 112 Z" fill="white" opacity="0.7"/>

  <!-- Marca de verificação dourada (destaque) -->
  <circle cx="340" cy="330" r="64" fill="url(#bgGrad)"/>
  <circle cx="340" cy="330" r="60" fill="url(#goldGrad)"/>
  <path d="M312 330 L332 352 L372 308" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Brilho superior -->
  <ellipse cx="200" cy="50" rx="120" ry="30" fill="white" opacity="0.05"/>
</svg>
