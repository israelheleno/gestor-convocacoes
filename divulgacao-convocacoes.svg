<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A"/>
      <stop offset="100%" style="stop-color:#0f2060"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4ff"/>
    </linearGradient>
    <filter id="sombra">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <filter id="brilho">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="rgba(245,200,66,0.6)"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Círculos decorativos de fundo -->
  <circle cx="720" cy="80" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="80" cy="420" r="100" fill="rgba(255,255,255,0.03)"/>
  <circle cx="400" cy="250" r="300" fill="rgba(255,255,255,0.02)"/>

  <!-- Linha dourada superior -->
  <rect x="0" y="0" width="800" height="5" fill="url(#gold)"/>

  <!-- Card central -->
  <rect x="60" y="60" width="680" height="380" rx="24" fill="url(#card)" filter="url(#sombra)"/>

  <!-- Faixa dourada no topo do card -->
  <rect x="60" y="60" width="680" height="80" rx="24" fill="url(#gold)"/>
  <rect x="60" y="110" width="680" height="30" fill="url(#gold)"/>

  <!-- Ícone documento no card -->
  <rect x="96" y="78" width="44" height="54" rx="5" fill="rgba(255,255,255,0.3)"/>
  <rect x="96" y="78" width="44" height="54" rx="5" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="104" y1="100" x2="132" y2="100" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
  <line x1="104" y1="110" x2="132" y2="110" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
  <line x1="104" y1="120" x2="120" y2="120" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>

  <!-- Título no card -->
  <text x="160" y="95" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)" letter-spacing="2">CÂMARA MUNICIPAL · TV CÂMARA</text>
  <text x="160" y="124" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="white">Gestor de Convocações</text>

  <!-- Conteúdo do card -->
  <!-- Funcionalidade 1 -->
  <circle cx="112" cy="210" r="22" fill="#eff6ff"/>
  <text x="112" y="217" font-family="Arial" font-size="18" text-anchor="middle">📷</text>
  <text x="148" y="203" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1E3A8A">Escaneie a convocação</text>
  <text x="148" y="222" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Tire foto do papel e o sistema lê automaticamente</text>

  <!-- Funcionalidade 2 -->
  <circle cx="112" cy="280" r="22" fill="#eff6ff"/>
  <text x="112" y="287" font-family="Arial" font-size="18" text-anchor="middle">🔔</text>
  <text x="148" y="273" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1E3A8A">Notificação automática</text>
  <text x="148" y="292" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Cada convocado é identificado e notificado</text>

  <!-- Funcionalidade 3 -->
  <circle cx="112" cy="350" r="22" fill="#eff6ff"/>
  <text x="112" y="357" font-family="Arial" font-size="18" text-anchor="middle">📅</text>
  <text x="148" y="343" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1E3A8A">Adiciona à sua agenda</text>
  <text x="148" y="362" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Google Calendar ou Apple Calendar com 1 toque</text>

  <!-- Divisor vertical -->
  <line x1="480" y1="165" x2="480" y2="415" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- QR / Link section -->
  <text x="590" y="205" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Acesse pelo celular</text>

  <!-- Moldura QR simulada -->
  <rect x="530" y="215" width="120" height="120" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Cantos QR -->
  <rect x="542" y="227" width="28" height="28" rx="4" fill="none" stroke="#1E3A8A" stroke-width="3"/>
  <rect x="550" y="235" width="12" height="12" rx="2" fill="#1E3A8A"/>
  <rect x="618" y="227" width="28" height="28" rx="4" fill="none" stroke="#1E3A8A" stroke-width="3"/>
  <rect x="626" y="235" width="12" height="12" rx="2" fill="#1E3A8A"/>
  <rect x="542" y="303" width="28" height="28" rx="4" fill="none" stroke="#1E3A8A" stroke-width="3"/>
  <rect x="550" y="311" width="12" height="12" rx="2" fill="#1E3A8A"/>
  <!-- Pixels QR simulados -->
  <rect x="580" y="227" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="592" y="227" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="580" y="239" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="600" y="245" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="580" y="257" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="592" y="263" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="604" y="257" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="580" y="275" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="596" y="281" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="580" y="293" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="592" y="299" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="604" y="293" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="616" y="275" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="616" y="257" width="8" height="8" rx="1" fill="#1E3A8A"/>
  <rect x="616" y="299" width="8" height="8" rx="1" fill="#1E3A8A"/>

  <!-- Logo no centro do QR -->
  <rect x="578" y="259" width="32" height="32" rx="6" fill="url(#gold)" filter="url(#brilho)"/>
  <text x="594" y="280" font-family="Arial" font-size="16" text-anchor="middle" fill="white" font-weight="700">C</text>

  <!-- Link -->
  <rect x="510" y="348" width="160" height="32" rx="16" fill="url(#gold)"/>
  <text x="590" y="369" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1E3A8A" text-anchor="middle">bit.ly/tvcamara</text>

  <text x="590" y="400" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Android · iPhone · Gratuito</text>

  <!-- Rodapé -->
  <text x="400" y="470" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">São José do Rio Preto · Câmara Municipal</text>
</svg>
