<script>
// ═══════════════════════════════════════════════
// CONFIGURAÇÃO
// ═══════════════════════════════════════════════
firebase.initializeApp({apiKey:"AIzaSyAOpV5NFydHWwUwQKg0MANqMHVcXVDDqpQ",authDomain:"gestor-convocacoes-89823.firebaseapp.com",projectId:"gestor-convocacoes-89823",storageBucket:"gestor-convocacoes-89823.firebasestorage.app",messagingSenderId:"212389113483",appId:"1:212389113483:web:eb97eefe621df0cba66e8e"});
const auth=firebase.auth();const db=firebase.firestore();
const EMAIL_CONFIG={publicKey:'mXZPykI5Nr2COjWr0',serviceId:'service_pam1xgd',templateId:'template_3926tbq'};

let eu=null,grupoId=null,ocrDados=null,matches=[],camStream=null,eventoTroca=null,substitutoSelecionado=null,eventoAtualMod=null,nomesEditaveis=[];
let notifAtual=null,filaNotifs=[],listaAusencias=[],membroEditando=null,saldoUsuario={ferias:[],abono:6,licenca:90};
let toastTimeout,periodosAjuste=[],usuarioSelecionadoFerias=null,usuariosGrupo=[];

function mostrarToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimeout);toastTimeout=setTimeout(()=>t.classList.remove('show'),2500);}
function lev(a,b){if(a===b)return 0;const m=a.length,n=b.length;const dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}
function mostrarAba(aba,el){document.querySelectorAll('.aba-content').forEach(e=>e.style.display='none');document.getElementById('aba-'+aba).style.display='block';document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));if(el)el.classList.add('active');if(aba==='ferias'){carregarFerias();if(eu&&eu.is_admin)document.getElementById('btn-para-outro').style.display='block';}if(aba==='saldo')carregarSaldo();}
(function(){emailjs.init(EMAIL_CONFIG.publicKey);})();

// ═══════════════════════════════════════════════
// AUTENTICAÇÃO (COM TIMEOUT DE SEGURANÇA)
// ═══════════════════════════════════════════════
let authTimeout;
const loadingScreen=document.getElementById('loading-screen');

// Timeout de segurança: se em 8 segundos não autenticar, redireciona para login
authTimeout=setTimeout(()=>{
  if(loadingScreen.style.display!=='none'){
    loadingScreen.style.display='none';
    window.location.replace('login.html');
  }
},8000);

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(()=>{
  auth.onAuthStateChanged(async user=>{
    // Limpar timeout de segurança
    clearTimeout(authTimeout);
    
    // Esconder tela de carregamento
    loadingScreen.style.display='none';
    
    if(!user){
      window.location.replace('login.html');
      return;
    }
    try{
      const snap=await db.collection('usuarios').doc(user.uid).get();
      if(!snap.exists){
        window.location.replace('login.html');
        return;
      }
      eu={uid:user.uid,...snap.data()};
      document.getElementById('h-user').textContent=eu.nome_completo+' · '+eu.cargo;
      if(eu.is_admin){
        document.getElementById('btn-fab-admin').classList.add('on');
        document.getElementById('btn-para-outro').style.display='block';
      }
      verificarInstalacao();iniciarNotificacoes();carregarGrupos();
      if(eu.grupo_id){grupoId=eu.grupo_id;carregarEventos();verificarAprovacoes();verificarNotificacoesPendentes();iniciarVerificacaoLembretes();}
      else{document.getElementById('lst-ev').innerHTML='<p style="color:var(--light);padding:20px;text-align:center">Entre em um grupo para ver convocações.</p>';document.getElementById('prox').innerHTML='<div class="card-vazio">Entre em um grupo para ver suas convocações.</div>';}
      verificarCadastroCompleto();limparEventosAntigos();
    }catch(err){
      console.error('Erro ao carregar dados:',err);
      // Em caso de erro de rede, mantém na tela atual mas mostra mensagem
      mostrarToast('⚠️ Erro de conexão. Tente recarregar.');
    }
  });
}).catch(e=>{
  console.error('Persistence error:',e);
  clearTimeout(authTimeout);
  loadingScreen.style.display='none';
  window.location.replace('login.html');
});

// ... (todo o restante do JavaScript da versão 19.1 permanece idêntico) ...
</script>
